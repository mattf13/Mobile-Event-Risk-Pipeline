services:
  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      # Mantieni SOLO questa riga per Postgres
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pipeline-network

  rabbitmq:
    image: rabbitmq:3-management
    env_file: .env
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - pipeline-network

  ingestion_api:
    build:
      context: .
      dockerfile: services/ingestion_api/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    networks:
      - pipeline-network

  events_generator:
    build:
      context: .
      dockerfile: services/events_generator/Dockerfile
    env_file: .env
    depends_on:
      - ingestion_api
    networks:
      - pipeline-network

  risk_scorer:
    build:
      context: .
      dockerfile: services/risk_scorer/Dockerfile
    env_file: .env
    depends_on:
      - db
      - rabbitmq
    networks:
      - pipeline-network

networks:
  pipeline-network:
    driver: bridge

volumes:
  postgres_data:
