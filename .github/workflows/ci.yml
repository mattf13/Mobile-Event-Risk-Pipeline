name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # independent job
  test-logic:
    name: Run Unit Tests and Linting
    runs-on: ubuntu-latest

    # env variables
    env:
      PYTHONPATH: .
      POSTGRES_DB: test_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_HOST: localhost
      POSTGRES_HOST: localhost

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 3. Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic pika requests psycopg2-binary

      - name: 4. Install Service-Specific Requirements
        run: |
          if [ -f services/ingestion_api/requirements.txt ]; then pip install -r services/ingestion_api/requirements.txt; fi
          if [ -f services/events_generator/requirements.txt ]; then pip install -r services/events_generator/requirements.txt; fi
          if [ -f services/risk_scorer/requirements.txt ]; then pip install -r services/risk_scorer/requirements.txt; fi

      - name: 5. Static Analysis (Linting)
        run: |
          pip install flake8
          # Check for syntax errors and undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 6. Execute Pytest Suite
        run: |
          # Eseguiamo i test sulla logica di rischio
          pytest tests/test_risk_scorer.py