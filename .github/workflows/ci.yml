name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # independent job
  test-logic:
    name: Run Unit Tests and Linting
    runs-on: ubuntu-latest

    # env variables
    env:
      PYTHONPATH: .
      POSTGRES_DB: test_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_HOST: localhost
      POSTGRES_HOST: localhost

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest psycopg2-binary
          # Install services requirements
          find services -name "requirements.txt" -exec pip install -r {} \;

      - name: Run Pytest
        env:
          PYTHONPATH: .
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          RABBITMQ_USER: guest
          RABBITMQ_PASS: guest
          GROQ_API_KEY: dummy_for_ci
        run: |
          # Run all tests in the folder
          pytest tests/