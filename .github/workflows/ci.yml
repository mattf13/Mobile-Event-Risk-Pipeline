name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # JOB 1: LINTING
  lint:
    name: Code Quality (Pylint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pytest pydantic pika requests psycopg2-binary httpx openai
          find services -name "requirements.txt" -exec pip install -r {} \;

      - name: Run Pylint
        run: |
          pylint $(git ls-files '*.py') --rcfile=.pylintrc

  # JOB 2: TESTING
  test:
    name: Automated Tests (Pytest)
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    
    env:
      PYTHONPATH: .
      POSTGRES_DB: ci_test
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      GROQ_API_KEY: dummy_key

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic pika requests psycopg2-binary httpx openai
          find services -name "requirements.txt" -exec pip install -r {} \;

      - name: Execute Pytest Suite
        run: |
          python -m pytest tests/